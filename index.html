<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexz Hub</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow-x: hidden;
}

/* PARTICLE */
canvas {
    position: fixed;
    z-index: -1;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, red, darkred);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    box-shadow: 0 0 20px red;
}

/* SECTION */
.section {
    padding: 20px;
    opacity: 0;
    transform: translateY(30px);
    animation: fade 0.7s forwards;
}

@keyframes fade {
    to { opacity: 1; transform: translateY(0); }
}

/* BOX */
.box {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px red;
}

/* BUTTON */
.button {
    background: red;
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    display: inline-block;
    margin-top: 10px;
}

/* GAME GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 15px;
}

.game {
    text-align: center;
    cursor: pointer;
}

.game img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.game img:hover {
    transform: scale(1.1);
}

/* TOGGLE MUSIC */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: red;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">🚀 REXZ HUB</div>

<div class="section">
<h2>🎮 Support Game</h2>
<div class="box">
<div class="games" id="games"></div>
</div>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- MUSIC -->
<audio id="bgMusic" loop src="https://files.catbox.moe/8h7w0x.mp3"></audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>
function playClick() {
    document.getElementById("clickSound").play();
}
</script>

<!-- GAME LIST AUTO -->
<script>
const games = [
    {id: 9753814298, name: "Swing Obby"},
    {id: 97365843755210, name: "Cut Grass"},
    {id: 106772177198260, name: "Reel Brainrot"},
    {id: 96645548064314, name: "Catch And Tame"},
    {id: 93724112271596, name: "Vacuum"},
    {id: 99248392277037, name: "Untitled Melee RNG"}
];

const container = document.getElementById("games");

games.forEach(g => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
        <img src="https://thumbnails.roblox.com/v1/places/gameicons?placeIds=${g.id}&size=150x150&format=Png">
        <p>${g.name}</p>
    `;

    div.onclick = () => {
        playClick();
        window.open(`https://www.roblox.com/games/${g.id}`, "_blank");
    };

    container.appendChild(div);
});
</script>

<!-- PARTICLE -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    requestAnimationFrame(animate);
}
animate();
</script>

<!-- MUSIC TOGGLE -->
<script>
let playing = false;
const music = document.getElementById("bgMusic");

function toggleMusic() {
    if (!playing) {
        music.play();
        playing = true;
    } else {
        music.pause();
        playing = false;
    }
}
</script>

</body>
</html>
