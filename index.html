<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexz Hub</title>

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial;
    overflow-x: hidden;
    background: black;
}

/* PARTICLE BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, red, darkred);
    padding: 25px;
    text-align: center;
    font-size: 30px;
    box-shadow: 0 0 20px red;
}

/* SECTION */
.section {
    padding: 20px;
}

/* BOX */
.box {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px red;
}

/* BUTTON */
.button {
    display: inline-block;
    padding: 10px 15px;
    background: red;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.1);
}

/* GAME GRID */
.game-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 15px;
}

.game {
    text-align: center;
}

.game img {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.game img:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">🚀 REXZ HUB</div>

<div class="section">
<h2>🎮 Support Game (Auto)</h2>
<div class="box">
<div class="game-list" id="games"></div>
</div>
</div>

<div class="section">
<h2>🔥 Join</h2>
<div class="box">
<a class="button" onclick="playClick()" href="https://wa.me/6288989208953" target="_blank">
Join WhatsApp
</a>
</div>
</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
function playClick() {
    document.getElementById("clickSound").play();
}
</script>

<!-- AUTO GAME LIST -->
<script>
const gameIds = [
    9753814298,
    97365843755210,
    106772177198260,
    96645548064314,
    93724112271596,
    99248392277037
];

const container = document.getElementById("games");

gameIds.forEach(id => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
        <img src="https://thumbnails.roblox.com/v1/places/gameicons?placeIds=${id}&size=150x150&format=Png">
        <p>ID: ${id}</p>
    `;

    container.appendChild(div);
});
</script>

<!-- PARTICLE BACKGROUND -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
