<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexz Hub</title><style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

.header {
    background: linear-gradient(90deg,#ff0000,#990000);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.section {
    padding: 20px;
}

.box {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
}

.button {
    background: red;
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

.game:hover {
    background:#222;
    cursor:pointer;
}
</style></head><body><canvas id="bg"></canvas>

<div class="header">🚀 REXZ HUB</div><div class="section">
<h2>🎮 Support Game</h2>
<div class="box">
<table id="gameTable" width="100%">
<tr>
<th>Game</th>
<th>Status</th>
<th>Preview</th>
</tr>
</table>
</div>
</div><audio id="clickSound" src="https://www.myinstants.com/media/sounds/mouse-click.mp3"></audio> <audio id="bgMusic" loop> <source src="https://files.catbox.moe/6nq3v0.mp3"> </audio>

<button class="button" onclick="toggleMusic()">🎵 Toggle Music</button>

<script>
// PARTICLES
const c = document.getElementById("bg");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let p = [];
for(let i=0;i<100;i++){
    p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="red";
    p.forEach(a=>{
        ctx.beginPath();
        ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
        ctx.fill();
        a.y+=0.5;
        if(a.y>c.height)a.y=0;
    });
    requestAnimationFrame(draw);
}
draw();

// SOUND
window.addEventListener("click",()=>{
    document.getElementById("clickSound").play();
});

function toggleMusic(){
    let m = document.getElementById("bgMusic");
    if(m.paused) m.play(); else m.pause();
}

// GAME LIST (PAKE ID DARI WEB)
const games = [
    {name:"Swing Obby", id:9753814298, status:"🟢"},
    {name:"Cut Grass", id:97365843755210, status:"🟢"},
    {name:"Reel A Brainrot", id:106772177198260, status:"🟢"},
    {name:"Catch And Tame", id:96645548064314, status:"👀"},
    {name:"Vacuum Brainrot", id:93724112271596, status:"👀"},
    {name:"Untitled Melee RNG", id:99248392277037, status:"👀"}
];

async function getPlaceId(universeId){
    try{
        let res = await fetch(`https://apis.roblox.com/universes/v1/universes/${universeId}`);
        let data = await res.json();
        return data.rootPlaceId;
    }catch{
        return universeId;
    }
}

async function loadGames(){
    const table = document.getElementById("gameTable");

    for(let g of games){
        let placeId = await getPlaceId(g.id);

        try{
            let res = await fetch(`https://thumbnails.roblox.com/v1/places/gameicons?placeIds=${placeId}&size=150x150&format=Png`);
            let data = await res.json();
            let img = data.data[0].imageUrl;

            table.innerHTML += `
            <tr class="game" onclick="playGame(${placeId})">
                <td>${g.name}</td>
                <td>${g.status}</td>
                <td><img src="${img}" width="60"></td>
            </tr>`;
        }catch{
            table.innerHTML += `
            <tr class="game">
                <td>${g.name}</td>
                <td>${g.status}</td>
                <td>❌</td>
            </tr>`;
        }
    }
}

function playGame(id){
    window.open(`https://www.roblox.com/games/${id}`,"_blank");
}

loadGames();
</script></body>
</html>
